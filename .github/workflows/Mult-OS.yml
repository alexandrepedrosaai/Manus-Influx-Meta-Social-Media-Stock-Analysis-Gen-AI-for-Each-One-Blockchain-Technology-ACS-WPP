name: Multi-OS Build & Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: GOOS=linux GOARCH=amd64 make
      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: cpp-linux
          path: build/linux/bin/*

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Enable long paths
        run: git config --system core.longpaths true
        shell: pwsh
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install make
        run: choco install make --no-progress -y
        shell: pwsh
      - name: Build
        shell: bash
        run: |
          GOOS=windows GOARCH=amd64 make build
      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: cpp-windows
          path: build/windows/bin/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: GOOS=darwin GOARCH=amd64 make
      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: cpp-macos
          path: build/darwin/bin/*

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Generate manifests
        run: |
          bash ./scripts/generate-sbom.sh > sbom.json
          bash ./scripts/generate-attention.sh > attention.json
          bash ./scripts/generate-immutable.sh > immutable.json

      - name: Package artifacts
        run: |
          cd artifacts
          tar czf ../multi-os-linux-${{ github.run_number }}.tar.gz -C cpp-linux . 2>/dev/null || true
          tar czf ../multi-os-windows-${{ github.run_number }}.tar.gz -C cpp-windows . 2>/dev/null || true
          tar czf ../multi-os-macos-${{ github.run_number }}.tar.gz -C cpp-macos . 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: multi-os-v${{ github.run_number }}
          name: "Multi-OS Build ${{ github.run_number }}"
          body: |
            ## Multi-OS Build ${{ github.run_number }}
            **Commit:** ${{ github.sha }}

            ### Platform Binaries
            - Linux x64
            - Windows x64
            - macOS x64

            ### Manifests
            - SBOM, Attention, Immutable
          draft: false
          prerelease: false
          files: |
            multi-os-linux-${{ github.run_number }}.tar.gz
            multi-os-windows-${{ github.run_number }}.tar.gz
            multi-os-macos-${{ github.run_number }}.tar.gz
            sbom.json
            attention.json
            immutable.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
