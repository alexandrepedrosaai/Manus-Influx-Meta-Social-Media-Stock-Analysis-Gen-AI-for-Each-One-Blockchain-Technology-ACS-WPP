
name: OS Packages Build and Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        os_image:
          - name: "manusacswppos"
            file: "Dockerfile.ManusACSWppOS"
          - name: "2.0azureos"
            file: "Dockerfile.2.0AzureOS"
          - name: "matrixblockchain"
            file: "Dockerfile.MATRIXBLOCKCHAIN"
          - name: "smartcontractbookdocs"
            file: "Dockerfile.SmartContractBookdocs"
          - name: "soliditycontracts"
            file: "Dockerfile.soliditycontracts"
          - name: "immutablecontracts"
            file: "Dockerfile.immutablecontracts"
          - name: "wppmicrosoftteamsacs"
            file: "Dockerfile.WppMicrosoftTeamsACS"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.os_image.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.os_image.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
