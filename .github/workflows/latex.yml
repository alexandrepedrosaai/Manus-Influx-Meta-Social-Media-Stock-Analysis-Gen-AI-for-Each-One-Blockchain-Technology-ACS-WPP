name: LaTeX CI

on:
  push:
    branches:
      - main
      - 'mona/octocat'
      - 'releases/**'
    tags:
      - v2
      - v1.*
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: "0 6 * * 1"   # roda toda segunda-feira às 03:00 BRT (06:00 UTC)

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-20.04, ubuntu-22.04, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache LaTeX packages
        uses: actions/cache@v4
        with:
          path: /var/lib/apt/lists
          key: ${{ runner.os }}-latex-cache
          restore-keys: |
            ${{ runner.os }}-latex-

      - name: Cache latexmk artifacts
        uses: actions/cache@v4
        with:
          path: |
            *.aux
            *.bbl
            *.blg
            *.toc
            *.out
            *.fls
            *.fdb_latexmk
          key: ${{ runner.os }}-latexmk-${{ github.ref_name }}-${{ github.run_number }}
          restore-keys: |
            ${{ runner.os }}-latexmk-

      - name: Install LaTeX
        run: sudo apt-get update && sudo apt-get install -y \
             texlive-latex-base texlive-latex-extra texlive-fonts-recommended \
             texlive-bibtex-extra biber latexmk

      - name: Compile LaTeX document with bibliography
        run: latexmk -pdf -bibtex -halt-on-error -interaction=nonstopmode manuscript.tex

      - name: Check for LaTeX warnings
        run: |
          if grep -q "LaTeX Warning" manuscript.log; then
            echo "Build failed due to LaTeX warnings."
            exit 1
          fi

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: Manuscript-PDF-${{ matrix.os }}-${{ github.ref_name }}-build${{ github.run_number }}
          path: manuscript.pdf

      - name: Generate changelog
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "## Changes since last release" > changelog.md
          git fetch --tags
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log $PREV_TAG..HEAD --pretty=format:"- %s" >> changelog.md
          else
            git log --pretty=format:"- %s" >> changelog.md
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body_path: changelog.md
          draft: false
          prerelease: false

      - name: Attach PDF to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: manuscript.pdf
          asset_name: Manuscript-${{ matrix.os }}-${{ github.ref_name }}.pdf
          asset_content_type: application/pdf

      - name: Clean auxiliary files
        run: latexmk -c manuscript.tex
